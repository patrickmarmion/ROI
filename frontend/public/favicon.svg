<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#00C896"/>

  <!-- Ears -->
  <circle cx="14" cy="16" r="9" fill="#1a1a1a"/>
  <circle cx="50" cy="16" r="9" fill="#1a1a1a"/>
  <circle cx="14" cy="16" r="5" fill="#333"/>
  <circle cx="50" cy="16" r="5" fill="#333"/>

  <!-- Head -->
  <ellipse cx="32" cy="36" rx="20" ry="18" fill="white"/>

  <!-- Eye patches -->
  <ellipse cx="24" cy="32" rx="7" ry="6" fill="#1a1a1a"/>
  <ellipse cx="40" cy="32" rx="7" ry="6" fill="#1a1a1a"/>

  <!-- Eyes -->
  <circle cx="24" cy="32" r="3" fill="white"/>
  <circle cx="40" cy="32" r="3" fill="white"/>
  <circle cx="24" cy="32" r="1.5" fill="#1a1a1a"/>
  <circle cx="40" cy="32" r="1.5" fill="#1a1a1a"/>

  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="4" ry="3" fill="#1a1a1a"/>

  <!-- Mouth -->
  <path d="M28 43 Q32 47 36 43" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
